[package]
name = "pass-mgr"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
arboard = "3.6.1"
argon2 = "0.5.3"
chacha20poly1305 = "0.10.1"
directories = "6.0.0"
eframe = "0.34.3"
getrandom = "0.4.2"
ratatui = "0.30.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
thiserror = "2.0.18"
zeroize = { version = "1.9.0", features = ["derive"] }

[profile.release]
# Strip symbols and debug info from the release binary (smaller distributable).
strip = true
