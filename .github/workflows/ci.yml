name: CI

# Runs the full verification suite on every push to main and every PR, so the
# hardening (tests, crash/full-disk recovery, lints, dependency advisories, Windows
# portability, and a parser fuzz smoke) can't silently regress. The project is
# deliberately hand-formatted, so there is NO `cargo fmt` check.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # eframe/arboard link X11/xcb/xkb libs on Linux even though the tests never open
      # a window, so the test binaries need these to LINK.
      - name: Install GUI link deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test (default)
        run: cargo test --workspace --all-targets
      - name: Test (fault-injection — crash / full-disk recovery)
        # fault-injection lives on pass-mgr-core; the desktop crate forwards it so the
        # `__crashop` binary + tests/crash_recovery.rs exercise the real fault points.
        run: cargo test -p pass-mgr-core -p pass-mgr --features pass-mgr/fault-injection
      - name: Test (release — overflow-checks on, stripped)
        # The release profile flips on integer overflow-checks (root Cargo.toml) and
        # strips symbols; run the suite in release so release-only behavior can't
        # silently diverge from the debug builds CI otherwise relies on.
        run: cargo test --workspace --release

  audit:
    name: supply chain (cargo-audit + cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit
      # cargo-deny enforces deny.toml: advisories, the license allow-list, and the
      # crates.io-only source policy, so a new dependency can't slip in an unvetted
      # license or registry.
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  windows-cross:
    name: windows cross-compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      # --bins checks both the console `pass-mgr` and the GUI-subsystem `pass-mgr-gui`,
      # so the Windows `windows_subsystem` build can't regress.
      - run: cargo check --target x86_64-pc-windows-gnu --bins

  fuzz-smoke:
    name: fuzz smoke (parsers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      # Build all targets, then a short run of each untrusted-input parser fuzzer. A
      # crash leaves an artifact and fails the job.
      - name: Build + short-run the parser fuzzers
        run: |
          cargo +nightly fuzz build
          # parse_*/scan_volume fuzz the untrusted-input parsers; doc_paths fuzzes the
          # user-controlled document path helpers for the no-space/no-separator/
          # no-traversal/length invariants.
          for t in parse_header parse_frame parse_manifest scan_volume doc_paths; do
            cargo +nightly fuzz run "$t" -- -max_total_time=30 -print_final_stats=1
          done
          # merge_from drives the REAL plan/apply_merge_from end-to-end against hostile
          # source vaults (writes real volumes/manifests + crypto, then reopens) — the
          # highest-value durability fuzzer. It does disk I/O, so give it its own shorter
          # budget rather than the 30s parser slice.
          cargo +nightly fuzz run merge_from -- -max_total_time=20 -print_final_stats=1

  coverage:
    name: coverage (cargo-llvm-cov, informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # eframe/arboard link X11/xcb/xkb even though the tests never open a window.
      - name: Install GUI link deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-llvm-cov --locked
      # Informational ONLY (no --fail-under gate): a flaky line-count threshold on rarely
      # hit error-handling arms would block PRs for little signal. The summary surfaces
      # untested branches (e.g. the decrypt BadNonce arm, the mlock-off Key::new path) in
      # the job log so they can be closed deliberately.
      - run: cargo llvm-cov --workspace --all-features --summary-only

  android:
    name: android apk build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      # Match the NDK pinned in mobile/composeApp/build.gradle.kts (ndkVersion).
      - name: Install SDK packages + NDK
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;34.0.0" "ndk;30.0.14904198"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      # Gobley cross-builds the Rust cdylib for each ABI, generates the Kotlin
      # UniFFI bindings, and assembles the APK. Reuses the audited pass-mgr-core.
      - name: Build the debug APK
        run: mobile/gradlew -p mobile :composeApp:assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: composeApp-debug-apk
          path: mobile/composeApp/build/outputs/apk/debug/composeApp-debug.apk
          if-no-files-found: error
