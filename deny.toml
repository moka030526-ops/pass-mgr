# cargo-deny policy (supply-chain). Run: `cargo deny check`.
# Complements `cargo audit` (advisories) with license, source, and duplicate-version
# policy across the whole dependency tree, including the mobile/FFI and desktop deps.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# The workspace's own crates are a private application (publish = false) and carry no
# license field; skip them — this policy governs third-party dependencies.
private = { ignore = true }
# Permissive/compatible licenses present in the tree. cargo-deny errors on any crate
# whose license is not in this list, so a surprise copyleft/unknown dep is caught.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
    # Font licenses for the default UI font egui bundles (permissive, OK to ship).
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

[bans]
# Duplicate transitive versions are a benign ecosystem artifact here (e.g. the
# getrandom triplication), so keep this a warning rather than failing CI.
multiple-versions = "warn"
# But a wildcard ("*") version requirement on a REGISTRY crate is a supply-chain
# hazard (any future release is silently accepted), so fail CI if one appears.
wildcards = "deny"
# ...except our own intra-workspace `{ path = "..." }` deps, which carry no version
# and would otherwise be flagged as wildcards. This still denies registry wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
